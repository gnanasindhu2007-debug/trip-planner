<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Dates - Travel Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1488646953014-85cb44e25828");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
}

/* Navigation */

nav{
    background:rgba(0,0,0,0.7);
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:500;
}

nav ul li a:hover{
    color:#00b4d8;
}

/* Main Container */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
}

.card{
    width:600px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:35px;
    color:white;
    box-shadow:0px 8px 20px rgba(0,0,0,0.4);
}

.card h1{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00b4d8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0096c7;
}

#result{
    margin-top:25px;
    padding:20px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}

footer{
    text-align:center;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:20px;
    margin-top:30px;
}

</style>
</head>
<body>

<nav>

<div class="logo">✈ Travel Planner</div>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/destination/">Destination</a></li>
<li><a href="/activities/">Activities</a></li>
<li><a href="/travelldates/">Travel Dates</a></li>
<li><a href="/weather/">Weather</a></li>
<li><a href="/googlemaps/">Maps</a></li>
<li><a href="/itinerary/">Itinerary</a></li>
<li><a href="/tripplan/">Trip Plan</a></li>
<li><a href="/login/">Login</a></li>
</ul>

</nav>

<div class="container">

<div class="card">

<h1>📅 Travel Dates Planner</h1>

<label>Traveler Name</label>
<input type="text" id="name" placeholder="Enter Your Name">

<label>Destination</label>
<input type="text" id="destination" placeholder="Enter Destination">

<label>Start Date</label>
<input type="date" id="startDate">

<label>End Date</label>
<input type="date" id="endDate">

<button onclick="calculateTrip()">
Calculate Trip Duration
</button>

<div id="result"></div>

</div>

</div>

<footer>
<h3>Travel Itinerary Planner</h3>
<p>Choose Your Travel Dates Wisely</p>
</footer>

<script>

function calculateTrip(){

let name =
document.getElementById("name").value;

let destination =
document.getElementById("destination").value;

let start =
new Date(document.getElementById("startDate").value);

let end =
new Date(document.getElementById("endDate").value);

if(name=="" || destination==""){
alert("Please fill all details");
return;
}

let difference =
(end - start)/(1000*60*60*24);

if(difference < 0){
alert("End Date must be after Start Date");
return;
}

document.getElementById("result").innerHTML=
`
<h2>🧳 Trip Information</h2>
<br>
<p><strong>Name:</strong> ${name}</p>
<p><strong>Destination:</strong> ${destination}</p>
<p><strong>Trip Duration:</strong> ${difference} Days</p>
<p><strong>Status:</strong> Ready for Travel ✈</p>
`;
}

</script>

</body>
</html>
