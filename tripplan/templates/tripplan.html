<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Plan | Travel Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1488646953014-85cb44e25828");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
}

nav{
background:rgba(0,0,0,0.8);
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:28px;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:20px;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:500;
}

nav ul li a:hover{
color:#00d4ff;
}

.hero{
text-align:center;
padding:50px 20px;
color:white;
}

.hero h1{
font-size:45px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

.plan-box{
width:80%;
max-width:700px;
margin:20px auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
color:white;
}

.plan-box label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:600;
}

.plan-box input,
.plan-box select,
.plan-box textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

.plan-box button{
margin-top:20px;
width:100%;
padding:12px;
background:#00b4d8;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

.plan-box button:hover{
background:#0096c7;
}

#tripResult{
display:none;
width:80%;
max-width:700px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
}

footer{
background:rgba(0,0,0,0.8);
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<nav>
<div class="logo">✈ Travel Planner</div>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/destination/">Destination</a></li>
<li><a href="/activities/">Activities</a></li>
<li><a href="/travelldates/">Travel Dates</a></li>
<li><a href="/weather/">Weather</a></li>
<li><a href="/googlemaps/">Maps</a></li>
<li><a href="/itinerary/">Itinerary</a></li>
<li><a href="/budget/">Budget</a></li>
<li><a href="/tripplan/">Trip Plan</a></li>
<li><a href="/login/">Login</a></li>
</ul>
</nav>

<div class="hero">
<h1>🧳 Plan Your Dream Trip</h1>
<p>Create a complete travel plan easily</p>
</div>

<div class="plan-box">

<label>Destination</label>
<input type="text" id="destination" placeholder="Enter Destination">

<label>Travel Date</label>
<input type="date" id="date">

<label>Budget (₹)</label>
<input type="number" id="budget">

<label>Activity</label>
<select id="activity">
<option>Beach Fun</option>
<option>Trekking</option>
<option>Camping</option>
<option>Sightseeing</option>
<option>Shopping</option>
<option>Night Life</option>
</select>

<label>Notes</label>
<textarea id="notes" rows="4" placeholder="Additional trip notes"></textarea>

<button onclick="generateTrip()">Generate Trip Plan</button>

</div>

<div id="tripResult"></div>

<footer>
<h3>Travel Itinerary Planner</h3>
<p>Explore • Plan • Travel</p>
</footer>

<script>

function generateTrip(){

let destination=document.getElementById("destination").value;
let date=document.getElementById("date").value;
let budget=document.getElementById("budget").value;
let activity=document.getElementById("activity").value;
let notes=document.getElementById("notes").value;

document.getElementById("tripResult").style.display="block";

document.getElementById("tripResult").innerHTML=`

<h2>✅ Trip Plan Summary</h2>

<hr><br>

<p><strong>Destination:</strong> ${destination}</p>

<p><strong>Travel Date:</strong> ${date}</p>

<p><strong>Budget:</strong> ₹${budget}</p>

<p><strong>Activity:</strong> ${activity}</p>

<p><strong>Notes:</strong> ${notes}</p>

<br>

<h3>🎉 Your Trip Plan is Ready!</h3>

`;

}

</script>

</body>
</html>
